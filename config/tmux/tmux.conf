unbind-key -a

set -g pane-border-lines double

set  -g base-index      1
setw -g pane-base-index 1

setw -g mode-keys   vi
set  -g focus-events on

set  -g mouse             on
set  -s escape-time       0
set  -g history-limit     2000

set  -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,*256col*:RGB,alacritty:RGB,kitty:RGB"

bind r source-file $HOME/.config/tmux/tmux.conf \; display "Reloaded!"
bind t choose-tree

bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D

bind C-Left resize-pane -L 5
bind C-Right resize-pane -R 5
bind C-Up resize-pane -U 3
bind C-Down resize-pane -D 3

bind s split-window -v
bind v split-window -h

bind Enter new-window
bind c kill-pane
bind q kill-window
bind d detach
bind Q confirm-before -p "Kill entire session? (y/n)" kill-session

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy || xclip -in -selection clipboard"
bind / copy-mode \; command-prompt -p "(search down)" "send -X search-forward '%%%'"

bind ? copy-mode \; command-prompt -p "(search up)"   "send -X search-backward '%%%'"
# set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'egel/tmux-gruvbox'

# run '~/.config/tmux/plugins/tpm/tpm'
